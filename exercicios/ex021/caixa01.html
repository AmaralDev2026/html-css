<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de caixas</title>
    <style>
        h1 {/* box-level*/
            background-color: lightgray;
            height: 300px;
            width: 300px;

            /*border-width: 10px;
            border-style: solid;
            border-color:darkslategray;*/
            border: 10px solid darkslategray;/*modo simplificado da linha acima*/

            /*padding-top: 10px;
            padding-right: 10px;
            padding-bottom: 10px;
            padding-left: 10px;*/
            padding: 10px;/*modo simplificado da linha acima*/

            /*margin-top: 20px;
            margin-right: 20px;
            margin-bottom: 10px;
            margin-left: 20px;*/
            margin: 20px 20px 10px 20px;/*modo simplificado da linha acima*/

            /*outline-width: 5px;
            outline-style: dashed;
            outline-color: salmon;*/
            outline: 5px dashed salmon ;/*modo simplificado da linha acima*/
        }

        a { /* inline-level*/
            border-width: 10px;
            border-style: solid;
            border-color: red;
        }
    </style>
</head>
<body>
    <h1>Exemplo de caixas box-level</h1>
    <p>Parágrafos também são exemplos de box-level, mas os <a href="#">links são exemplos de de caixas inline-level</a>. Vamos ver como tudo funciona.</p>
</body>
</html>
