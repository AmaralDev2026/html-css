<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style001.css">
    <title>Tabelas</title>
</head>
<body>
    <h1>Minha primeira tabela</h1>
    <!--
        HIERARQUIA DE TABELAS (simples)
        TABLE = tabela
            TABLE ROW = linha de tabela  => <tr></tr>
                TABLE HEADER = cabeçalho de tabela
                TABLE DATA = dado de tabela  => <td></td>
    -->
    <table>
        <tr>  <!-- Primeira linha --><!-- tr => são linhas -->
            <td>A1</td>
            <td>B1</td> <!-- td => são dados -->
            <td>C1</td>
        </tr>
        <tr class="linha"> <!-- Segunda linha -->
            <td>A2</td>
            <td>B2</td>
            <td class="numero">C2</td>
        </tr>
        <tr>   <!-- Terceira linha -->
            <td>A3</td>
            <td>B3</td>
            <td class="numero">C3</td>
        </tr>
        <tr>   <!-- Quarta linha -->
            <td>A4</td>
            <td class="dado">B4</td>
            <td>C4</td>
        </tr>
        <tr>  <!-- Quinta linha -->
            <td>A5</td>
            <td>B5</td>
        </tr>
        <tr>  <!-- Sexta linha -->
            <td>A6</td>
        </tr>
    </table>
</body>
</html>
