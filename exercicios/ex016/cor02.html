<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradiente em css</title>
    <style>
        *{/*configurações globais do css*/
            height: 100%;
        }
        body{
            background-image: linear-gradient(to bottom, #A0A676, #D9A79C);/*para o degrade indique a direção -to top(pra cima), to left(pra esquerda), to right(pra direita), to bottom(pra baixo)*/background-attachment: fixed;
        }
    </style>
</head>
<body>
    <h1>Testando Gradiente</h1>
</body>
</html>
